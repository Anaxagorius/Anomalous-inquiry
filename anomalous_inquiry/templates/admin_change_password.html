<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Change Password — Anomalous Inquiry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: radial-gradient(circle at top, #0c2430 0, #020617 50%, #000000 100%); }</style>
  </head>
  <body class="min-h-screen text-white flex items-center justify-center px-4">
    <div class="w-full max-w-md space-y-6">
      {% if !forced %}<div class="text-sm"><a href="/admin" class="text-teal-300 hover:underline">← Admin Dashboard</a></div>{% endif %}
      <h1 class="text-3xl font-bold text-center">🔑 Change Password</h1>
      {% if forced %}<div class="bg-amber-900/40 border border-amber-500/50 rounded-xl px-4 py-3 text-amber-200 text-sm">You must change your password before continuing.</div>{% endif %}
      {% if let Some(err) = error %}<div class="bg-red-900/40 border border-red-500/50 rounded-xl px-4 py-3 text-red-200 text-sm">{{ err }}</div>{% endif %}
      <form method="post" action="/admin/change-password" class="bg-white/5 border border-teal-500/40 rounded-2xl p-6 backdrop-blur-md space-y-4">
        <div>
          <label class="block text-sm text-teal-100/80 mb-1">New Password</label>
          <input type="password" name="new_password" required minlength="8" class="w-full bg-black/40 border border-teal-500/30 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-teal-400"/>
        </div>
        <div>
          <label class="block text-sm text-teal-100/80 mb-1">Confirm Password</label>
          <input type="password" name="confirm_password" required minlength="8" class="w-full bg-black/40 border border-teal-500/30 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-teal-400"/>
        </div>
        <button type="submit" class="w-full py-2 rounded-lg bg-gradient-to-r from-teal-500 to-cyan-600 font-semibold hover:opacity-90 transition">Update Password</button>
      </form>
    </div>
  </body>
</html>
