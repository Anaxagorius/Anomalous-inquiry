<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin Dashboard — Anomalous Inquiry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: radial-gradient(circle at top, #0c2430 0, #020617 50%, #000000 100%); }</style>
  </head>
  <body class="min-h-screen text-white px-4 py-8">
    <div class="max-w-4xl mx-auto space-y-8">
      <header class="flex items-center justify-between">
        <h1 class="text-3xl font-bold">🔒 Admin Dashboard</h1>
        <nav class="flex gap-4 text-sm">
          <a href="/journal" class="text-teal-300 hover:underline">Journal</a>
          <a href="/home" class="text-teal-300 hover:underline">Archive</a>
          <a href="/admin/logout" class="text-teal-300 hover:underline">Logout</a>
        </nav>
      </header>
      <section class="bg-white/5 border border-cyan-500/40 rounded-2xl p-6 backdrop-blur-md">
        <h2 class="text-xl font-semibold mb-2">Quick Actions</h2>
        <div class="flex gap-4 flex-wrap">
          <a href="/journal" class="px-4 py-2 rounded-lg bg-gradient-to-r from-teal-500 to-cyan-600 text-sm font-semibold hover:opacity-90 transition">Manage Journal</a>
          <a href="/admin/change-password" class="px-4 py-2 rounded-lg border border-teal-500/40 text-sm font-semibold hover:bg-teal-500/20 transition">Change Password</a>
        </div>
      </section>
    </div>
  </body>
</html>
