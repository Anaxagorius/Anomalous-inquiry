<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Admin Login — Anomalous Inquiry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: radial-gradient(circle at top, #0c2430 0, #020617 50%, #000000 100%); }</style>
  </head>
  <body class="min-h-screen text-white flex items-center justify-center px-4">
    <div class="w-full max-w-md space-y-6">
      <h1 class="text-3xl font-bold text-center">🔒 Admin Login</h1>
      {% if let Some(err) = error %}<div class="bg-red-900/40 border border-red-500/50 rounded-xl px-4 py-3 text-red-200 text-sm">{{ err }}</div>{% endif %}
      <form method="post" action="/admin/login" class="bg-white/5 border border-teal-500/40 rounded-2xl p-6 backdrop-blur-md space-y-4">
        <div>
          <label class="block text-sm text-teal-100/80 mb-1">Username</label>
          <input type="text" name="username" required class="w-full bg-black/40 border border-teal-500/30 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-teal-400" placeholder="admin"/>
        </div>
        <div>
          <label class="block text-sm text-teal-100/80 mb-1">Password</label>
          <input type="password" name="password" required class="w-full bg-black/40 border border-teal-500/30 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-teal-400"/>
        </div>
        <button type="submit" class="w-full py-2 rounded-lg bg-gradient-to-r from-teal-500 to-cyan-600 font-semibold hover:opacity-90 transition">Log In</button>
      </form>
      <p class="text-center text-sm text-teal-100/60"><a href="/" class="text-teal-300 hover:underline">← Back to home</a></p>
    </div>
  </body>
</html>
