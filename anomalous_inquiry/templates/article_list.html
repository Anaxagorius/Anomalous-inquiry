<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Articles — Anomalous Inquiry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: radial-gradient(circle at top, #0c2430 0, #020617 50%, #000000 100%); }</style>
  </head>
  <body class="min-h-screen text-white px-4 py-8">
    <div class="max-w-4xl mx-auto space-y-6">
      <header class="flex items-center justify-between">
        <h1 class="text-3xl font-bold">📄 Research Archive</h1>
        <a href="/home" class="text-teal-300 hover:underline text-sm">← Home</a>
      </header>
      <p class="text-teal-100/60 text-sm">{{ articles.len() }} articles — sorted by date</p>
      <div class="space-y-3">
        {% for article in articles %}
        <a href="/articles/{{ article.slug }}" class="block bg-white/5 border border-teal-500/30 rounded-2xl p-4 backdrop-blur-md hover:border-teal-400/70 transition">
          <div class="flex items-start justify-between gap-4">
            <div class="space-y-1">
              <h2 class="font-semibold text-teal-100">{{ article.title }}</h2>
              <p class="text-xs text-teal-100/50">{{ article.published }}</p>
            </div>
            {% if !article.tags.is_empty() %}
            <div class="flex flex-wrap gap-1 shrink-0">
              {% for tag in article.tags %}
              <span class="px-2 py-0.5 text-xs rounded-full bg-teal-900/50 border border-teal-500/30 text-teal-300">{{ tag }}</span>
              {% endfor %}
            </div>
            {% endif %}
          </div>
        </a>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
