<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Tag: {{ tag }} — Anomalous Inquiry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: radial-gradient(circle at top, #0c2430 0, #020617 50%, #000000 100%); }</style>
  </head>
  <body class="min-h-screen text-white px-4 py-8">
    <div class="max-w-4xl mx-auto space-y-6">
      <header class="flex items-center justify-between">
        <h1 class="text-3xl font-bold">🏷️ {{ tag }}</h1>
        <div class="flex gap-4 text-sm">
          <a href="/tags" class="text-teal-300 hover:underline">← All Tags</a>
          <a href="/home" class="text-teal-300 hover:underline">Home</a>
        </div>
      </header>
      <p class="text-teal-100/60 text-sm">{{ articles.len() }} articles</p>
      <div class="space-y-3">
        {% for article in articles %}
        <a href="/articles/{{ article.slug }}" class="block bg-white/5 border border-teal-500/30 rounded-2xl p-4 backdrop-blur-md hover:border-teal-400/70 transition">
          <h2 class="font-semibold text-teal-100">{{ article.title }}</h2>
          <p class="text-xs text-teal-100/50 mt-1">{{ article.published }}</p>
        </a>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
