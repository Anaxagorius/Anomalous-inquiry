<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Timeline — Anomalous Inquiry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: radial-gradient(circle at top, #0c2430 0, #020617 50%, #000000 100%); }</style>
  </head>
  <body class="min-h-screen text-white px-4 py-8">
    <div class="max-w-4xl mx-auto space-y-6">
      <header class="flex items-center justify-between">
        <h1 class="text-3xl font-bold">📅 Timeline of Anomalous Events</h1>
        <a href="/home" class="text-teal-300 hover:underline text-sm">← Home</a>
      </header>
      <div class="relative space-y-4 border-l-2 border-teal-500/30 pl-6 ml-4">
        {% for event in events %}
        <div class="relative">
          <div class="absolute -left-8 top-1.5 w-3 h-3 rounded-full bg-teal-500/80 border-2 border-teal-400/60"></div>
          <div class="bg-white/5 border border-teal-500/30 rounded-2xl p-4 backdrop-blur-md hover:border-teal-400/60 transition">
            <div class="flex items-center gap-3 mb-2">
              <span class="text-sm font-mono text-cyan-300 font-bold">{{ event.date }}</span>
              <span class="px-2 py-0.5 text-xs rounded-full bg-teal-900/50 border border-teal-500/30 text-teal-300">{{ event.category }}</span>
            </div>
            <h2 class="font-semibold text-teal-100 mb-1">{{ event.title }}</h2>
            <p class="text-sm text-teal-100/70">{{ event.description }}</p>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
