<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Timeline — Anomalous Inquiry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { background: radial-gradient(circle at top, #0c2430 0, #020617 50%, #000000 100%); }
      .timeline-track { cursor: grab; }
      .timeline-track:active { cursor: grabbing; }
      .line-clamp-5 {
        display: -webkit-box;
        -webkit-line-clamp: 5;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    </style>
  </head>
  <body class="min-h-screen text-white py-8">
    <div class="px-4 mb-6 max-w-screen-xl mx-auto">
      <header class="flex items-center justify-between">
        <h1 class="text-3xl font-bold">📅 Timeline of Anomalous Events</h1>
        <a href="/home" class="text-teal-300 hover:underline text-sm">← Home</a>
      </header>
      <p class="text-teal-100/50 text-sm mt-2">{{ events.len() }} events — scroll horizontally to explore</p>
    </div>

    <!-- Horizontal scrollable timeline -->
    <div class="timeline-track overflow-x-auto select-none pb-6 px-4" id="timelineTrack">
      <div class="relative inline-flex items-start gap-0 min-w-max">

        <!-- Horizontal axis line (sits at y=28px — centre of the 16px dot with 20px top padding) -->
        <div class="absolute left-0 right-0 top-[28px] h-px bg-teal-500/40 pointer-events-none z-0"></div>

        {% for event in events %}
        <div class="relative flex flex-col items-center w-72 px-3 pt-5">
          <!-- Dot on the axis -->
          <div class="relative z-10 w-4 h-4 rounded-full bg-teal-500 border-2 border-teal-300 shrink-0 mb-4 ring-4 ring-teal-500/10"></div>
          <!-- Connector from dot to card -->
          <div class="w-px h-4 bg-teal-500/40 shrink-0 -mt-1 mb-1"></div>
          <!-- Card -->
          <div class="bg-white/5 border border-teal-500/30 rounded-2xl p-4 backdrop-blur-md hover:border-teal-400/60 transition w-full">
            <span class="block text-xs font-mono text-cyan-300 font-bold mb-1">{{ event.date }}</span>
            <span class="inline-block px-2 py-0.5 text-xs rounded-full bg-teal-900/50 border border-teal-500/30 text-teal-300 mb-2">{{ event.category }}</span>
            <h2 class="font-semibold text-teal-100 mb-2 text-sm leading-snug">{{ event.title }}</h2>
            <p class="text-xs text-teal-100/70 line-clamp-5">{{ event.description }}</p>
            {% if let Some(url) = event.link %}
            <div class="mt-3">
              <a href="{{ url }}" class="inline-flex items-center gap-1 text-xs font-medium text-cyan-300 hover:text-cyan-100 border border-cyan-500/40 hover:border-cyan-300/60 rounded-full px-3 py-1 transition" target="_blank" rel="noopener">Read more →</a>
            </div>
            {% endif %}
          </div>
        </div>
        {% endfor %}

      </div>
    </div>

    <script>
      // Mouse drag-to-scroll for desktop users
      const track = document.getElementById('timelineTrack');
      let isDown = false, startX, scrollLeft;
      track.addEventListener('mousedown', e => {
        isDown = true;
        track.classList.add('active');
        startX = e.pageX - track.offsetLeft;
        scrollLeft = track.scrollLeft;
      });
      track.addEventListener('mouseleave', () => { isDown = false; });
      track.addEventListener('mouseup', () => { isDown = false; });
      track.addEventListener('mousemove', e => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - track.offsetLeft;
        track.scrollLeft = scrollLeft - (x - startX);
      });
    </script>
  </body>
</html>
